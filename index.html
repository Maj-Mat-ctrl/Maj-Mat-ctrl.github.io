<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon GitHub Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #161b22;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      max-width: 600px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #8b949e;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      text-decoration: none;
      background: #238636;
      color: white;
      border-radius: 8px;
      transition: 0.2s;
    }

    a:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>👋 Salut !</h1>
  <p>Bienvenue sur ma page GitHub.</p>
  <p>Ici tu trouveras mes projets et mes expérimentations.</p>

  <a href="https://github.com/">Voir mon GitHub</a>
</div>

</body>
</html>
